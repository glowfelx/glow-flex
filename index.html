<!DOCTYPE html>
<html>
<head>
<title>GlowNexus</title>

<style>
body {
  margin: 0;
  font-family: 'poppins', sans-serif;
  background: radial-gradient(circle, #0f172a, #020617);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}

header a {
  background: #25D366;
  padding: 10px 15px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

/* FORM */
.hero {
  text-align: center;
  margin-top: 20px;
}

input {
  padding: 10px;
  margin: 5px;
}

/* BUTTON */
.btn {
  background: #a3ff00;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  margin: 5px;
  cursor: pointer;
}

/* PRODUCTS */
.products {
  text-align: center;
  margin-top: 50px;
}

.products-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 200px;

  text-align: center;
}

.slider-img {
  width: 120px;
  height: 120px;
  border-radius: 10px;
  object-fit: cover;
}

/* FEEDBACK */
.review {
  background: #111;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <header style="display:flex; justify-content:space-between; align-items:center; padding:20px 40px;">

  <h2 style="font-size:26px;">GlowNexus</h2>

  <a href="https://wa.me/919541060347" target="_blank"
     style="background:#25D366; padding:10px 20px; border-radius:10px; text-decoration:none; color:white;">
    WhatsApp
  </a>

</header>

<section class="hero">
  <div style="text-align:center; margin-top:20px;">
  <img src="logo.jpeg" style="height:80px;">
</div>
  <p>Control lights with app | Music sync | Easy setup</p>

  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone Number">
  <input id="address" placeholder="Address">

  <br><br>

  <button class="btn" onclick="document.querySelector('.products').scrollIntoView()">
    View Products
  </button>
</section>

<section class="products">
  <h2>🔥 Our Products</h2>

  <div class="products-container">

    <!-- STRIP -->
    <div class="card">
      <img id="stripSlider" class="slider-img" src="strip1.jpeg">
      <h3>Glow Strip LED</h3>
      <p>₹999</p>
      <button class="btn" onclick="addToCart('Glow Strip LED')">Add to Cart</button>
      <button class="btn" onclick="orderNow('Glow Strip LED')">Order Now</button>
    </div>

    <!-- BULB -->
    <div class="card">
      <img id="bulbSlider" class="slider-img" src="bulb1.jpeg">
      <h3>Smart LED Bulb</h3>
      <p>₹499</p>
      <button class="btn" onclick="addToCart('Smart LED Bulb')">Add to Cart</button>
      <button class="btn" onclick="orderNow('Smart LED Bulb')">Order Now</button>
    </div>

    <!-- BAR -->
    <div class="card">
      <img id="barSlider" class="slider-img" src="bar1.jpeg">
      <h3>RGB Light Bar</h3>
      <p>₹699</p>
      <button class="btn" onclick="addToCart('RGB Light Bar')">Add to Cart</button>
      <button class="btn" onclick="orderNow('RGB Light Bar')">Order Now</button>
    </div>

  </div>
</section>

<section class="products">
  <h2>Customer Reviews</h2>

  <div class="review">
    <p>"Amazing lights, looks premium!"</p>
    <h4>- Aman, Mumbai</h4>
  </div>

  <div class="review">
    <p>"Worth every rupee, delivery fast!"</p>
    <h4>- Karan, Chandigarh</h4>
  </div>
</section>

<script>
function addToCart(product) {
  alert(product + " added to cart");
}

function orderNow(product) {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(name === "" || phone === "" || address === "") {
    alert("Fill all details first");
    return;
  }

  let msg = `Order: ${product}%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}`;
  window.open("https://wa.me/919541060347?text=" + msg);
}

/* SLIDERS */
let strip = ["strip1.jpeg","strip2.jpeg","strip3.jpeg"];
let bulb = ["bulb1.jpeg","bulb2.jpeg","bulb3.jpeg"];
let bar = ["bar1.jpeg","bar2.jpeg","bar3.jpeg"];

let i=0,j=0,k=0;

setInterval(()=>{
  i=(i+1)%strip.length;
  document.getElementById("stripSlider").src=strip[i];
},2000);

setInterval(()=>{
  j=(j+1)%bulb.length;
  document.getElementById("bulbSlider").src=bulb[j];
},2000);

setInterval(()=>{
  k=(k+1)%bar.length;
  document.getElementById("barSlider").src=bar[k];
},2000);
</script>

</body>
</html>
