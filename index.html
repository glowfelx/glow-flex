<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowFlex</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #0f172a, #020617);
    color: white;
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

/* Hero */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 48px;
    text-shadow: 0 0 20px #22c55e;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #22c55e; }
    to { text-shadow: 0 0 30px #4ade80; }
}

.hero img {
    width: 250px;
    border-radius: 20px;
    margin: 20px 0;
}

/* Button */
.btn {
    background: #22c55e;
    padding: 15px 30px;
    border: none;
    color: black;
    font-size: 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    background: #4ade80;
}

/* Features */
.features {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 60px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 15px;
    width: 200px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* Popup */
#popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #111827;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 30px #22c55e;
    text-align: center;
}

/* Overlay */
#overlay {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<header>
    <div>GlowFlex</div>
    <div>Limited Stock</div>
</header>

<section class="hero">
    <h1>Upgrade Your Room Instantly</h1>

    <img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">

    <p>Smart LED lights with app control & music sync</p>

    <a href="https://wa.me/919541060347?text=I want to order GlowFlex LED" class="btn">
Buy Now ₹999
</a>
</section>

<section class="features">
    <div class="card">
        <h3>Easy Setup</h3>
        <p>Install in minutes</p>
    </div>

    <div class="card">
        <h3>App Control</h3>
        <p>Control from phone</p>
    </div>

    <div class="card">
        <h3>Music Sync</h3>
        <p>Lights react to music</p>
    </div>
</section>

<!-- Overlay -->
<div id="overlay" onclick="closePopup()"></div>

<!-- Popup -->
<div id="popup">
    <h2>Order Placed ✅</h2>
    <p>Your product will arrive soon</p>
    <button class="btn" onclick="closePopup()">Close</button>
</div>

<script>
function buy() {
    document.getElementById("popup").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
