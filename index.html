<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowNexus</title>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:radial-gradient(circle,#0f172a,#020617);
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

header a{
  background:#25D366;
  padding:10px 20px;
  border-radius:10px;
  text-decoration:none;
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:20px;
}

.hero img{
  height:80px;
}

/* INPUT */
input{
  padding:10px;
  margin:5px;
}

/* BUTTON */
.btn{
  background:#a3ff00;
  padding:10px 20px;
  border-radius:10px;
  border:none;
  margin:5px;
  cursor:pointer;
}

/* PRODUCTS */
.products{
  text-align:center;
  margin-top:50px;
}

.products-container{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:220px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.slider-img{
  width:120px;
  height:120px;
  border-radius:10px;
  object-fit:cover;
}

/* REVIEWS */
.review{
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h2>GlowNexus</h2>

  <a href="https://wa.me/919541060347" target="_blank">
    WhatsApp
  </a>
</header>

<section class="hero">
  <img src="logo.jpeg">
  <h2>Upgrade Your Room Lighting 🔥</h2>

  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone Number">

  <br><br>

  <button class="btn" onclick="document.querySelector('.products').scrollIntoView()">
    View Products
  </button>
</section>

<section class="products">
  <h2>🔥 Our Products</h2>

  <div class="products-container">

    <!-- STRIP -->
    <div class="card">
      <img id="stripSlider" class="slider-img" src="strip1.jpeg">
      <h3>Glow Strip LED</h3>
      <p>₹999</p>
      <button class="btn" onclick="addToCart('Glow Strip LED')">Add to Cart</button>
      <button class="btn" onclick="orderNow('Glow Strip LED')">Order Now</button>
    </div>

    <!-- BULB -->
    <div class="card">
      <img id="bulbSlider" class="slider-img" src="bulb1.jpeg">
      <h3>Smart LED Bulb</h3>
      <p>₹499</p>
      <button class="btn" onclick="addToCart('Smart LED Bulb')">Add to Cart</button>
      <button class="btn" onclick="orderNow('Smart LED Bulb')">Order Now</button>
    </div>

    <!-- BAR -->
    <div class="card">
      <img id="barSlider" class="slider-img" src="bar1.jpeg">
      <h3>RGB Light Bar</h3>
      <p>₹699</p>
      <button class="btn" onclick="addToCart('RGB Light Bar')">Add to Cart</button>
      <button class="btn" onclick="orderNow('RGB Light Bar')">Order Now</button>
    </div>

  </div>
</section>

<section class="products">
  <h2>Customer Reviews</h2>

  <div class="review">
    <p>"Amazing lights, looks premium!"</p>
    <h4>- Aman, Mumbai</h4>
  </div>

  <div class="review">
    <p>"Worth every rupee, delivery fast!"</p>
    <h4>- Karan, Chandigarh</h4>
  </div>
</section>

<script>

/* CART */
function addToCart(product){
  alert(product + " added to cart");
}

/* WHATSAPP ORDER */
function orderNow(product){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;

  if(name=="" || phone==""){
    alert("Fill all details first");
    return;
  }

  let msg=`Order: ${product}%0AName: ${name}%0APhone: ${phone}`;
  window.open("https://wa.me/919541060347?text="+msg);
}

/* SLIDERS */
let strip=["strip1.jpeg","strip2.jpeg","strip3.jpeg"];
let bulb=["bulb1.jpeg","bulb2.jpeg","bulb3.jpeg"];
let bar=["bar1.jpeg","bar2.jpeg","bar3.jpeg"];

let i=0,j=0,k=0;

setInterval(()=>{
  i=(i+1)%strip.length;
  document.getElementById("stripSlider").src=strip[i];
},2000);

setInterval(()=>{
  j=(j+1)%bulb.length;
  document.getElementById("bulbSlider").src=bulb[j];
},2000);

setInterval(()=>{
  k=(k+1)%bar.length;
  document.getElementById("barSlider").src=bar[k];
},2000);

</script>

</body>
</html>
