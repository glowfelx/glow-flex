<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GlowNexus</title>

<style>

body {
  margin: 0;
  font-family: 'poppins', sans-serif;
  background: radial-gradient(circle, #0f172a, #020617);
  color: white;
}

/* PRODUCT SECTION */
.products {
  text-align: center;
  margin-top: 50px;
}

.products-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

/* CARD */
.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 230px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,255,0,0.1);
}

/* IMAGE */
.card img {
  width: 120px;
  height: 120px;
  border-radius: 10px;
  object-fit: cover;
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.1);
}

/* BUTTON */
.btn {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #a3ff12;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>

<body>

<section class="products">
<h2>🔥 Our Products</h2>

<div class="products-container">

<!-- STRIP -->
<div class="card">
  <img id="stripSlider" src="strip1.jpeg">
  <h3>Glow Strip LED</h3>
  <p>₹999</p>
  <button class="btn" onclick="addToCart('Glow Strip LED')">Add to Cart</button>
  <button class="btn" onclick="orderNow('Glow Strip LED')">Order Now</button>
</div>

<!-- BULB -->
<div class="card">
  <img id="bulbSlider" src="bulb1.jpeg">
  <h3>Smart LED Bulb</h3>
  <p>₹499</p>
  <button class="btn" onclick="addToCart('Smart LED Bulb')">Add to Cart</button>
  <button class="btn" onclick="orderNow('Smart LED Bulb')">Order Now</button>
</div>

<!-- BAR -->
<div class="card">
  <img id="barSlider" src="bar1.jpeg">
  <h3>RGB Light Bar</h3>
  <p>₹699</p>
  <button class="btn" onclick="addToCart('RGB Light Bar')">Add to Cart</button>
  <button class="btn" onclick="orderNow('RGB Light Bar')">Order Now</button>
</div>

</div>
</section>

<script>

/* ADD TO CART */
function addToCart(product){
  alert(product + " added to cart ✅");
}

/* ORDER NOW */
function orderNow(product){
  alert("Ordering: " + product);
}

/* STRIP SLIDER */
let stripImages = ["strip1.jpeg","strip2.jpeg","strip3.jpeg"];
let stripIndex = 0;

setInterval(() => {
  stripIndex = (stripIndex + 1) % stripImages.length;
  document.getElementById("stripSlider").src = stripImages[stripIndex];
}, 2000);

/* BULB SLIDER */
let bulbImages = ["bulb1.jpeg","bulb2.jpeg","bulb3.jpeg"];
let bulbIndex = 0;

setInterval(() => {
  bulbIndex = (bulbIndex + 1) % bulbImages.length;
  document.getElementById("bulbSlider").src = bulbImages[bulbIndex];
}, 2000);

/* BAR SLIDER */
let barImages = ["bar1.jpeg","bar2.jpeg","bar3.jpeg"];
let barIndex = 0;

setInterval(() => {
  barIndex = (barIndex + 1) % barImages.length;
  document.getElementById("barSlider").src = barImages[barIndex];
}, 2000);

</script>

</body>
</html>
