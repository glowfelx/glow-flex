<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GlowNexus</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:#0b1220;
  --accent:#a3ff00;
  --accent-2:#00ff88;
  --muted:#9aa4b2;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:'Poppins';
  color:#fff;
  background:var(--bg);
}

/* HEADER */
header{
  position:sticky; top:0; z-index:50;
  background: rgba(2,6,23,.6);
}
.nav{
  display:flex; justify-content:space-between; padding:15px;
}

/* HERO */
.hero{text-align:center; padding:20px}
.logo{height:80px}

/* BUTTON */
.btn{
  background:var(--accent);
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* PRODUCTS */
.products{text-align:center}
.products-grid{
  display:grid; grid-template-columns:repeat(3,1fr); gap:15px;
}
.card{
  background:#111;
  padding:15px;
  border-radius:10px;
}

/* CART */
#cartPanel{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#0b1220;
padding:20px;
transition:0.3s;
z-index:999;
}
</style>
</head>

<body>

<header>
<div class="nav">
  <div>GlowNexus</div>
  <div onclick="toggleCart()">🛒</div>
</div>
</header>

<section class="hero">
<img class="logo" src="logo.jpeg">
<h2>Upgrade Your Room Lighting</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<br><br>
<button class="btn" onclick="goProducts()">Shop</button>
</section>

<section id="products" class="products">

<div class="products-grid">

<div class="card">
<img id="stripSlider" src="strip1.jpeg" width="100">
<h3>Glow Strip</h3>
<p>₹999</p>
<button class="btn" onclick="addToCart('Glow Strip',999)">Add</button>
</div>

<div class="card">
<img id="bulbSlider" src="bulb1.jpeg" width="100">
<h3>Bulb</h3>
<p>₹499</p>
<button class="btn" onclick="addToCart('Bulb',499)">Add</button>
</div>

<div class="card">
<img id="barSlider" src="bar1.jpeg" width="100">
<h3>Bar</h3>
<p>₹699</p>
<button class="btn" onclick="addToCart('Bar',699)">Add</button>
</div>

</div>
</section>

<!-- CART -->
<div id="cartPanel">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3>Total ₹<span id="total">0</span></h3>
<button class="btn" onclick="checkout()">Pay</button>
</div>

<script>

function goProducts(){
document.getElementById('products').scrollIntoView();
}

let cart=[];

function toggleCart(){
let p=document.getElementById("cartPanel");
p.style.right=p.style.right=="0px"?"-320px":"0px";
}

function addToCart(name,price){
cart.push({name,price});
updateCart();
}

function updateCart(){
let html="", total=0;
cart.forEach(i=>{
html+=`<p>${i.name} - ₹${i.price}</p>`;
total+=i.price;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function checkout(){
if(cart.length==0){
alert("Cart empty");
return;
}
alert("Payment Successful ✅ (Demo)");
cart=[];
updateCart();
}

/* SLIDER */
let s=["strip1.jpeg","strip2.jpeg","strip3.jpeg"];
let b=["bulb1.jpeg","bulb2.jpeg","bulb3.jpeg"];
let r=["bar1.jpeg","bar2.jpeg","bar3.jpeg"];

let i=0,j=0,k=0;

setInterval(()=>{i=(i+1)%3; stripSlider.src=s[i]},2000);
setInterval(()=>{j=(j+1)%3; bulbSlider.src=b[j]},2000);
setInterval(()=>{k=(k+1)%3; barSlider.src=r[k]},2000);

</script>

</body>
</html>
