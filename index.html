<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowNexus</title>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#020617;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:#111;
  position:sticky;
  top:0;
}

.cart-btn{
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:20px;
}

.hero img{
  height:80px;
}

/* INPUT */
input{
  padding:10px;
  margin:5px;
}

/* BUTTON */
button{
  background:#a3ff00;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* PRODUCTS */
.products{
  text-align:center;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  width:200px;
}

.card img{
  width:120px;
  height:120px;
}

/* CART */
.cart{
  position:fixed;
  right:-300px;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

.cart.active{
  right:0;
}

</style>
</head>

<body>

<header>
<h2>GlowNexus</h2>
<div class="cart-btn" onclick="toggleCart()">🛒 Cart</div>
</header>

<section class="hero">
<img src="logo.jpeg">
<h2>Upgrade Your Room Lighting 🔥</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<br>
<button onclick="document.querySelector('.products').scrollIntoView()">Shop Now</button>
</section>

<section class="products">
<h2>Our Products</h2>

<div class="container">

<div class="card">
<img id="strip" src="strip1.jpeg">
<h3>Glow Strip</h3>
<p>₹999</p>
<button onclick="addToCart('Strip',999)">Add</button>
</div>

<div class="card">
<img id="bulb" src="bulb1.jpeg">
<h3>Smart Bulb</h3>
<p>₹499</p>
<button onclick="addToCart('Bulb',499)">Add</button>
</div>

<div class="card">
<img id="bar" src="bar1.jpeg">
<h3>Light Bar</h3>
<p>₹699</p>
<button onclick="addToCart('Bar',699)">Add</button>
</div>

</div>
</section>

<!-- CART -->
<div class="cart" id="cart">
<h2>Cart</h2>
<div id="items"></div>
<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="checkout()">Pay Now</button>
</div>

<script>
let cart=[];

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function addToCart(name,price){
  cart.push({name,price});
  updateCart();
}

function updateCart(){
  let html="";
  let total=0;

  cart.forEach(item=>{
    html+=`<p>${item.name} - ₹${item.price}</p>`;
    total+=item.price;
  });

  document.getElementById("items").innerHTML=html;
  document.getElementById("total").innerText=total;
}

function checkout(){
  alert("Payment Successful (Dummy)");
  cart=[];
  updateCart();
}

/* SLIDER */
let s=["strip1.jpeg","strip2.jpeg","strip3.jpeg"];
let b=["bulb1.jpeg","bulb2.jpeg","bulb3.jpeg"];
let r=["bar1.jpeg","bar2.jpeg","bar3.jpeg"];

let i=0,j=0,k=0;

setInterval(()=>{i=(i+1)%3; strip.src=s[i]},2000);
setInterval(()=>{j=(j+1)%3; bulb.src=b[j]},2000);
setInterval(()=>{k=(k+1)%3; bar.src=r[k]},2000);
</script>

</body>
</html>
