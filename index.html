<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GlowNexus</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:#0b1220;
  --accent:#a3ff00;
  --accent-2:#00ff88;
  --muted:#9aa4b2;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:'Poppins',system-ui;
  color:#fff;
  background:
    radial-gradient(800px 400px at 80% -10%, rgba(0,255,136,.15), transparent 60%),
    radial-gradient(700px 350px at 10% -10%, rgba(163,255,0,.15), transparent 60%),
    var(--bg);
}

/* HEADER */
header{
  position:sticky; top:0; z-index:50;
  background: rgba(2,6,23,.6);
}
.nav{
  max-width:1100px; margin:auto; padding:14px 20px;
  display:flex; justify-content:space-between;
}
.nav a{
  background:#25D366; padding:10px; border-radius:10px;
  text-decoration:none; color:white;
}

/* HERO */
.hero{text-align:center; padding:30px}
.logo{height:80px}

/* BUTTON */
.btn{
  background:#a3ff00;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* PRODUCTS */
.products{text-align:center}
.products-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.card{
  background:#111;
  padding:20px;
  border-radius:15px;
}
.img{
  width:120px;
  height:120px;
}

/* CART */
.cart-panel{
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

/* ✅ NEW FIX */
.cart-open{
  right:0 !important;
}

</style>
</head>

<body>

<header>
  <div class="nav">
    <div>GlowNexus</div>
    <a href="https://wa.me/919541060347">WhatsApp</a>
  </div>
</header>

<section class="hero">
  <img src="logo.jpeg" class="logo">
  <h1>Upgrade Your Room Lighting ✨</h1>

  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="address" placeholder="Address">

  <br><br>
  <button class="btn" onclick="goProducts()">View Products</button>
  <button class="btn" onclick="toggleCart()">🛒 Cart</button>
</section>

<section id="products" class="products">
  <h2>Our Products</h2>

  <div class="products-grid">

    <div class="card">
      <img id="stripSlider" class="img" src="strip1.jpeg">
      <h3>Glow Strip LED</h3>
      <p>₹999</p>
      <button class="btn" onclick="addToCart('Glow Strip LED',999)">Add</button>
    </div>

    <div class="card">
      <img id="bulbSlider" class="img" src="bulb1.jpeg">
      <h3>Smart Bulb</h3>
      <p>₹499</p>
      <button class="btn" onclick="addToCart('Bulb',499)">Add</button>
    </div>

    <div class="card">
      <img id="barSlider" class="img" src="bar1.jpeg">
      <h3>Light Bar</h3>
      <p>₹699</p>
      <button class="btn" onclick="addToCart('Bar',699)">Add</button>
    </div>

  </div>
</section>

<!-- CART -->
<div id="cartPanel" class="cart-panel">
  <!-- ✅ CLOSE BUTTON -->
  <button onclick="toggleCart()">Close ❌</button>

  <h2>Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total">Total: ₹0</h3>

  <button class="btn" onclick="payNow()">Pay Now</button>
</div>

<script>
let cart = [];

function addToCart(name,price){
  cart.push({name,price});
  updateCart();
}

function updateCart(){
  let html="";
  let total=0;

  cart.forEach(item=>{
    html+=`<p>${item.name} - ₹${item.price}</p>`;
    total+=item.price;
  });

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText="Total: ₹"+total;
}

/* ✅ FIXED CART TOGGLE */
function toggleCart(){
  let panel = document.getElementById("cartPanel");
  panel.classList.toggle("cart-open");
}

function payNow(){
  alert("Payment Successful (Demo)");
}

function goProducts(){
  document.getElementById("products").scrollIntoView();
}

/* SLIDER */
let strip=["strip1.jpeg","strip2.jpeg","strip3.jpeg"];
let bulb=["bulb1.jpeg","bulb2.jpeg","bulb3.jpeg"];
let bar=["bar1.jpeg","bar2.jpeg","bar3.jpeg"];

let i=0,j=0,k=0;

setInterval(()=>{i=(i+1)%3;document.getElementById("stripSlider").src=strip[i]},2000);
setInterval(()=>{j=(j+1)%3;document.getElementById("bulbSlider").src=bulb[j]},2000);
setInterval(()=>{k=(k+1)%3;document.getElementById("barSlider").src=bar[k]},2000);
</script>

</body>
</html>
